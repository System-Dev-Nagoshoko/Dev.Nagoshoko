<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>名護商工 Event Guide</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.4.5/typescript.min.js"></script>

    <style>
        :root {
            --nago-navy: #003366;
            --nago-blue: #005bac;
            --bg-body: #f4f7f9;
            --text-main: #1a1a1a;
            --white: #ffffff;
        }
        body { font-family: sans-serif; margin: 0; background-color: var(--bg-body); padding-bottom: env(safe-area-inset-bottom); }
        header { background-color: var(--nago-navy); color: var(--white); padding: 20px 16px; text-align: center; }
        .tab-nav { display: flex; overflow-x: auto; background: var(--white); border-bottom: 2px solid var(--nago-blue); position: sticky; top: 0; z-index: 100; }
        .tab-nav button { flex: 1; min-width: 85px; padding: 14px 5px; border: none; background: none; font-weight: bold; color: var(--nago-blue); cursor: pointer; }
        .tab-nav button.active { background-color: #f0f4f8; border-bottom: 4px solid var(--nago-navy); }
        .card { background: var(--white); border-radius: 12px; padding: 16px; margin: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-bottom: 4px; background: white; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header><h1>名護商工 Event Guide</h1></header>
    <div id="app"><p style="text-align: center; padding: 50px;">main.ts を読み込み中...</p></div>

    <script>
        async function loadAndRunTs() {
            const app = document.getElementById('app');
            // 探すパスのリスト
            const paths = ['./src/main.ts', './main.ts', '../src/main.ts'];
            let tsCode = "";
            let foundPath = "";

            try {
                // 1. パスを順番に試す
                for (const path of paths) {
                    try {
                        const response = await fetch(path + '?t=' + new Date().getTime());
                        if (response.ok) {
                            tsCode = await response.text();
                            foundPath = path;
                            break;
                        }
                    } catch (e) { continue; }
                }

                if (!tsCode) {
                    throw new Error("どのパスからも main.ts が見つかりませんでした。");
                }

                // 2. TypeScript ライブラリのロード待ち
                let retry = 0;
                while (typeof ts === 'undefined' && retry < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    retry++;
                }

                // 3. 変換と実行
                const jsCode = ts.transpile(tsCode, { 
                    target: ts.ScriptTarget.ESNext,
                    module: ts.ModuleKind.None 
                });
                const script = document.createElement('script');
                script.text = jsCode;
                document.body.appendChild(script);
                console.log("成功: " + foundPath + " を実行しました");

            } catch (e) {
                app.innerHTML = `<div style="color:red; padding:20px; text-align:center;">
                    エラー: ${e.message}<br>
                    <small>ファイル構成が正しいか確認してください。</small>
                </div>`;
            }
        }
        window.addEventListener('load', loadAndRunTs);
    </script>
</body>
</html>
