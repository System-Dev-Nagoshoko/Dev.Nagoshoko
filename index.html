<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商工祭 CONNECT</title>
    <style>
        :root {
            --primary-color: #003366; /* 名護商工イメージ */
            --accent-color: #ff9900;
            --bg-color: #f4f7f9;
        }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); }
        header { background: var(--primary-color); color: white; padding: 1rem; text-align: center; }
        .search-container { padding: 1rem; position: sticky; top: 0; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #search-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        .event-list { padding: 1rem; display: grid; gap: 1rem; }
        .event-card { background: white; padding: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .event-card h3 { margin: 0 0 0.5rem 0; color: var(--primary-color); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; background: #eee; margin-right: 5px; }
        .loc-badge { background: #e3f2fd; color: #1976d2; }
        .time-badge { background: #fff3e0; color: #e65100; }
        .description { font-size: 0.9rem; color: #666; margin-top: 8px; }
        footer { text-align: center; padding: 2rem; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>商工祭 CONNECT</h1>
    <p>企画・会場案内システム</p>
</header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="企画名や場所でキーワード検索...">
</div>

<div id="app" class="event-list">
    </div>

<footer>
    &copy; 2026 商工祭 運営事務局
</footer>

<script type="module" src="./src/main.ts"></script>
</body>
</html>
