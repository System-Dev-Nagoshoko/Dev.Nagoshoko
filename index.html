<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>名護商工 Event Guide</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.4.5/typescript.min.js"></script>
<style>

        :root {

            --nago-navy: #003366;

            --nago-blue: #005bac;

            --bg-gray: #efeff4;

            --white: #ffffff;

            --border: #d1d1d6;

        }
 
        /* 画面全体を固定してスクロールさせない */

        html, body {

            margin: 0;

            padding: 0;

            height: 100%;

            overflow: hidden;

            background-color: var(--bg-gray);

            font-family: -apple-system, sans-serif;

        }
 
        /* 全体レイアウトのコンテナ */

        .wrapper {

            display: flex;

            flex-direction: column;

            height: 100vh;

        }
 
        /* 上部ヘッダー */

        header {

            background-color: var(--nago-navy);

            color: var(--white);

            padding: env(safe-area-inset-top) 0 10px;

            text-align: center;

            flex-shrink: 0;

            box-shadow: 0 1px 4px rgba(0,0,0,0.2);

        }

        header h1 { margin: 10px 0; font-size: 1.1rem; letter-spacing: 0.05em; }
 
        /* 中央のスクロール可能エリア */

        main {

            flex-grow: 1;

            overflow-y: auto;

            -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかに */

            padding-bottom: 20px;

        }
 
        /* 下部ナビゲーションバー */

        .bottom-nav {

            flex-shrink: 0;

            height: calc(55px + env(safe-area-inset-bottom));

            background-color: var(--white);

            border-top: 1px solid var(--border);

            display: flex;

            justify-content: space-around;

            padding-bottom: env(safe-area-inset-bottom);

        }
 
        .nav-item {

            flex: 1;

            text-decoration: none;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            color: #8e8e93;

            transition: 0.1s;

        }
 
        .nav-item.active {

            color: var(--nago-blue);

        }
 
        .nav-item .icon { font-size: 20px; margin-bottom: 2px; }

        .nav-item .label { font-size: 10px; font-weight: 500; }
 
        /* コンテンツ用スタイル */

        .card {

            background: var(--white);

            margin: 12px;

            padding: 16px;

            border-radius: 8px;

            box-shadow: 0 1px 2px rgba(0,0,0,0.1);

        }
</style>
</head>
<body>
 
    <div class="wrapper">
<header>
<h1>名護商工 Event Guide</h1>
</header>
 
        <main id="app">
<!-- コンテンツがここに挿入される -->
<p style="text-align: center; margin-top: 40px;">Loading...</p>
</main>
 
        <nav class="bottom-nav">
<a href="index.html" class="nav-item active">
<span class="icon">🏠</span>
<span class="label">HOME</span>
</a>
<a href="map.html" class="nav-item">
<span class="icon">📍</span>
<span class="label">MAP</span>
</a>
<a href="schedule.html" class="nav-item">
<span class="icon">🕒</span>
<span class="label">TIME</span>
</a>
<a href="settings.html" class="nav-item">
<span class="icon">⚙️</span>
<span class="label">INFO</span>
</a>
</nav>
</div>
 
    <script>

        // TypeScript読み込み処理（変更なし）

        async function loadAndRunTs() {

            const app = document.getElementById('app');

            const paths = ['./main.ts', './src/main.ts'];

            let tsCode = "";

            try {

                for (const p of paths) {

                    const res = await fetch(p + '?t=' + Date.now());

                    if (res.ok) { tsCode = await res.text(); break; }

                }

                if (!tsCode) throw new Error("main.ts not found");

                while (typeof ts === 'undefined') await new Promise(r => setTimeout(r, 50));

                const js = ts.transpile(tsCode, { target: 99, module: 0 });

                const s = document.createElement('script');

                s.text = js;

                document.body.appendChild(s);

            } catch (e) { app.innerHTML = `<p style="color:red; text-align:center;">${e.message}</p>`; }

        }

        window.addEventListener('load', loadAndRunTs);
</script>
</body>
</html>
