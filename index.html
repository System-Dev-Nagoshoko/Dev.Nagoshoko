<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>名護商工 Event Guide</title>
    
    <script src="./typescript.js"></script>

    <style>
        /* (これまでのCSSはそのまま維持) */
        :root { --nago-navy: #003366; --nago-blue: #005bac; --bg-body: #f4f7f9; --text-main: #1a1a1a; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-body); }
        header { background: var(--nago-navy); color: white; padding: 20px; text-align: center; }
        .tab-nav { display: flex; overflow-x: auto; background: white; border-bottom: 2px solid var(--nago-blue); }
        .tab-nav button { flex: 0 0 85px; padding: 12px; border: none; background: none; color: var(--nago-blue); font-weight: bold; }
        .tab-nav button.active { background: #f0f4f8; border-bottom: 4px solid var(--nago-navy); }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; border-left: 6px solid var(--nago-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header><h1>名護商工 Event Guide</h1></header>
    <div id="app"><p style="text-align:center; padding:50px;">システムを起動しています...</p></div>

    <script>
        // 100%確実に動かすための起動スクリプト
        async function runTs() {
            try {
                // ライブラリの準備を待つ
                if (typeof ts === 'undefined') {
                    throw new Error("typescript.js が読み込めていません。ファイルがリポジトリにあるか確認してください。");
                }

                // main.tsを取得
                const res = await fetch('./src/main.ts');
                if (!res.ok) throw new Error("main.ts が見つかりません。");
                const code = await res.text();

                // 変換して実行
                const js = ts.transpile(code, { target: 2, module: 0 });
                const script = document.createElement('script');
                script.text = js;
                document.body.appendChild(script);
                console.log("Success: TS -> JS");
            } catch (e) {
                document.getElementById('app').innerHTML = `<div style="color:red; padding:20px;">起動エラー: ${e.message}</div>`;
            }
        }
        window.addEventListener('DOMContentLoaded', runTs);
    </script>
</body>
</html>
