<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>名護商工 Event Guide</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.4.5/typescript.min.js"></script>

    <style>
        :root {
            --nago-navy: #003366;
            --nago-blue: #005bac;
            --bg-body: #f4f7f9;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --white: #ffffff;
        }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: env(safe-area-inset-bottom);
        }
        header {
            background-color: var(--nago-navy);
            color: var(--white);
            padding: 20px 16px;
            text-align: center;
        }
        .tab-nav {
            display: flex;
            overflow-x: auto;
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--nago-blue);
        }
        .tab-nav button {
            flex: 0 0 85px;
            padding: 12px 5px;
            border: none;
            background: none;
            font-weight: bold;
            color: var(--nago-blue);
            font-size: 0.75rem;
        }
        .tab-nav button.active {
            background-color: #f0f4f8;
            color: var(--nago-navy);
            border-bottom: 4px solid var(--nago-navy);
        }
        .event-list { padding: 16px; max-width: 600px; margin: 0 auto; }
        .card {
            background: var(--white);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 6px solid var(--nago-blue);
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        .badge {
            background: #eef2f6;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--nago-blue);
            font-size: 0.8rem;
        }
        footer { text-align: center; padding: 40px 16px; font-size: 0.8rem; color: var(--text-sub); }
    </style>
</head>
<body>

    <header>
        <h1>名護商工 Event Guide</h1>
    </header>

    <div id="app">
        <p style="text-align: center; padding: 40px; color: #666;">
            システム起動中...
        </p>
    </div>

    <footer>
        &copy; 2026 NYC. All rights reserved.
    </footer>

    <script>
        /**
         * TypeScriptをブラウザで実行するための最終手段
         */
        async function bootSystem() {
            const TARGET_TS = "./src/main.ts";
            const app = document.getElementById('app');

            try {
                // 1. ライブラリが読み込まれるのを最大5秒待機
                let retry = 0;
                while (typeof ts === 'undefined' && retry < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    retry++;
                }

                if (typeof ts === 'undefined') {
                    throw new Error("TypeScriptコンパイラの読み込みに時間がかかりすぎています。ページを更新してください。");
                }

                // 2. main.tsを取得
                const response = await fetch(TARGET_TS);
                if (!response.ok) throw new Error("main.tsファイルが読み込めません。パスを確認してください。");
                const tsCode = await response.text();

                // 3. JSに変換 (型定義を無視してトランスパイル)
                const jsCode = ts.transpile(tsCode, { 
                    target: ts.ScriptTarget.ESNext,
                    module: ts.ModuleKind.None,
                    noEmitOnError: false
                });

                // 4. 実行
                const scriptElement = document.createElement('script');
                scriptElement.text = jsCode;
                document.body.appendChild(scriptElement);
                
                console.log("TypeScript System: ON");

            } catch (e) {
                console.error("Boot Error:", e);
                app.innerHTML = `
                    <div style="padding:20px; color:#d32f2f; background:#ffebee; border-radius:8px; margin:20px;">
                        <strong>エラーが発生しました</strong><br>
                        ${e.message}
                    </div>
                `;
            }
        }

        // 実行
        bootSystem();
    </script>
</body>
</html>
