<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>名護商工 Event Guide</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.4.5/typescript.min.js"></script>

    <style>
        :root {
            --nago-navy: #003366;
            --nago-blue: #005bac;
            --bg-body: #f4f7f9;
            --text-main: #1a1a1a;
            --white: #ffffff;
        }
        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: var(--bg-body); padding-bottom: env(safe-area-inset-bottom); }
        header { background-color: var(--nago-navy); color: var(--white); padding: 20px 16px; text-align: center; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .tab-nav { display: flex; overflow-x: auto; background: var(--white); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--nago-blue); }
        .tab-nav button { flex: 1; min-width: 85px; padding: 14px 5px; border: none; background: none; font-weight: bold; color: var(--nago-blue); cursor: pointer; }
        .tab-nav button.active { background-color: #f0f4f8; border-bottom: 4px solid var(--nago-navy); }
        .card { background: var(--white); border-radius: 12px; padding: 16px; margin: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-bottom: 4px; background: white; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header><h1>名護商工 Event Guide</h1></header>
    <div id="app"><p style="text-align: center; padding: 50px;">main.ts を読み込み中...</p></div>

    <script>
        async function loadAndRunTs() {
            const app = document.getElementById('app');
            try {
                // 1. main.ts を取得 (キャッシュを避けるためタイムスタンプ付与)
                const response = await fetch('./src/main.ts?t=' + new Date().getTime());
                if (!response.ok) throw new Error("main.ts が見つかりません。パスを確認してください。");
                const tsCode = await response.text();

                // 2. TypeScript ライブラリの準備を待つ
                let retry = 0;
                while (typeof ts === 'undefined' && retry < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    retry++;
                }

                // 3. 変換と実行
                const jsCode = ts.transpile(tsCode, { target: ts.ScriptTarget.ESNext });
                const script = document.createElement('script');
                script.text = jsCode;
                document.body.appendChild(script);

            } catch (e) {
                app.innerHTML = `<div style="color:red; padding:20px; text-align:center;">エラー: ${e.message}</div>`;
            }
        }
        window.addEventListener('load', loadAndRunTs);
    </script>
</body>
</html>
